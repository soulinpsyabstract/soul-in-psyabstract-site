<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dandelion / Beast — Aelin AquaSoul</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Georgia','Times New Roman',serif}

.scene{
  position:relative;width:100%;height:100%;
  cursor:pointer;user-select:none;
  transition:background 1.2s ease;
  background:#0a0d14;
}

/* === DANDELION STATE === */
.scene .calm{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1s ease;
  opacity:1;z-index:2;
}
.scene.fire .calm{opacity:0;pointer-events:none}

.calm .line1{
  font-size:clamp(22px,5vw,42px);
  color:rgba(255,255,255,.85);
  text-align:center;
  letter-spacing:.04em;
  line-height:1.4;
  text-shadow:0 0 30px rgba(200,220,255,.15);
  padding:0 20px;
}
.calm .dandelion{
  font-size:clamp(50px,12vw,120px);
  margin:20px 0;
  filter:drop-shadow(0 0 20px rgba(255,255,255,.15));
  animation:sway 4s ease-in-out infinite;
}
@keyframes sway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}

/* Seeds floating */
.seed{
  position:absolute;
  width:4px;height:4px;
  background:rgba(255,255,255,.4);
  border-radius:50%;
  animation:float linear infinite;
  box-shadow:0 0 6px rgba(255,255,255,.2);
}
@keyframes float{
  0%{transform:translate(0,0) scale(1);opacity:.6}
  50%{opacity:.3}
  100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
}

/* Soft glow background */
.calm-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%, rgba(180,200,230,.06) 0%, transparent 60%);
  transition:opacity 1s;
}
.scene.fire .calm-bg{opacity:0}

/* === FIRE STATE === */
.scene .beast{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1s ease .2s;
  opacity:0;z-index:3;
  pointer-events:none;
}
.scene.fire .beast{opacity:1;pointer-events:auto}
.scene.fire{background:#0d0200}

.beast .line2{
  font-size:clamp(24px,5.5vw,48px);
  color:#fff;
  text-align:center;
  letter-spacing:.06em;
  line-height:1.4;
  font-weight:700;
  text-shadow:0 0 20px rgba(255,80,0,.6),0 0 60px rgba(255,40,0,.3),0 0 100px rgba(255,0,0,.2);
  padding:0 20px;
  animation:fireText 2s ease-in-out infinite alternate;
}
@keyframes fireText{
  0%{text-shadow:0 0 20px rgba(255,80,0,.6),0 0 60px rgba(255,40,0,.3)}
  100%{text-shadow:0 0 30px rgba(255,120,0,.8),0 0 80px rgba(255,60,0,.5),0 0 120px rgba(255,0,0,.3)}
}

.beast .fire-icon{
  font-size:clamp(50px,12vw,120px);
  margin:20px 0;
  animation:firePulse 1s ease-in-out infinite alternate;
}
@keyframes firePulse{
  0%{transform:scale(1);filter:brightness(1)}
  100%{transform:scale(1.1);filter:brightness(1.3)}
}

/* Fire particles */
.ember{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  animation:rise linear infinite;
  opacity:0;
}
.scene.fire .ember{opacity:1}
@keyframes rise{
  0%{transform:translate(0,0) scale(1);opacity:.8}
  50%{opacity:.6}
  100%{transform:translate(var(--ex),var(--ey)) scale(0);opacity:0}
}

/* Fire glow background */
.fire-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 70%, rgba(255,60,0,.12) 0%, rgba(255,0,0,.04) 30%, transparent 60%);
  opacity:0;transition:opacity 1.2s;
}
.scene.fire .fire-bg{opacity:1}

/* Bottom flame bar */
.flame-bar{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(0deg, rgba(255,60,0,.2) 0%, rgba(255,100,0,.08) 40%, transparent 100%);
  opacity:0;transition:opacity 1s;
}
.scene.fire .flame-bar{opacity:1}

/* Hint */
.hint{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  font-size:12px;color:rgba(255,255,255,.25);
  letter-spacing:.15em;text-transform:uppercase;
  font-family:system-ui,sans-serif;
  transition:opacity .5s;
  z-index:10;
}
.scene.fire .hint{opacity:0}

/* Author */
.author{
  position:absolute;top:20px;right:24px;
  font-size:11px;color:rgba(255,255,255,.2);
  font-family:'Courier New',monospace;
  letter-spacing:.1em;z-index:10;
}
</style>
</head>
<body>

<div class="scene" id="scene">
  <div class="calm-bg"></div>
  <div class="fire-bg"></div>
  <div class="flame-bar"></div>

  <!-- CALM STATE -->
  <div class="calm">
    <div class="dandelion">&#127800;</div>
    <div class="line1">Я одуванчик,<br>пока меня не трогают</div>
  </div>

  <!-- FIRE STATE -->
  <div class="beast">
    <div class="fire-icon">&#128293;</div>
    <div class="line2">Потом я превращаюсь<br>в бестию</div>
  </div>

  <div class="hint">tap to awaken</div>
  <div class="author">Aelin AquaSoul</div>
</div>

<script>
(function(){
  var scene = document.getElementById('scene');
  var isFireState = false;

  // Create dandelion seeds
  for(var i=0; i<25; i++){
    var s = document.createElement('div');
    s.className = 'seed';
    s.style.left = (10 + Math.random()*80) + '%';
    s.style.top = (20 + Math.random()*60) + '%';
    s.style.setProperty('--dx', (Math.random()*200-100)+'px');
    s.style.setProperty('--dy', (-100 - Math.random()*200)+'px');
    s.style.animationDuration = (4 + Math.random()*6) + 's';
    s.style.animationDelay = (Math.random()*8) + 's';
    s.style.width = s.style.height = (2 + Math.random()*4) + 'px';
    scene.appendChild(s);
  }

  // Create fire embers
  var colors = ['#ff4400','#ff6600','#ff8800','#ffaa00','#ff2200','#ffcc00'];
  for(var i=0; i<40; i++){
    var e = document.createElement('div');
    e.className = 'ember';
    e.style.left = (10 + Math.random()*80) + '%';
    e.style.bottom = (Math.random()*30) + '%';
    e.style.background = colors[Math.floor(Math.random()*colors.length)];
    e.style.boxShadow = '0 0 '+(4+Math.random()*8)+'px '+e.style.background;
    e.style.setProperty('--ex', (Math.random()*100-50)+'px');
    e.style.setProperty('--ey', (-150 - Math.random()*300)+'px');
    e.style.animationDuration = (2 + Math.random()*4) + 's';
    e.style.animationDelay = (Math.random()*4) + 's';
    e.style.width = e.style.height = (3 + Math.random()*6) + 'px';
    scene.appendChild(e);
  }

  // Toggle on click/tap
  scene.addEventListener('click', function(){
    isFireState = !isFireState;
    if(isFireState){
      scene.classList.add('fire');
    } else {
      scene.classList.remove('fire');
    }
  });

  // Auto-cycle for GIF recording: 4s calm → 4s fire → repeat
  var autoCycle = false;
  window.addEventListener('keydown', function(ev){
    if(ev.key === 'g' || ev.key === 'G'){
      autoCycle = !autoCycle;
      if(autoCycle) runCycle();
    }
  });
  function runCycle(){
    if(!autoCycle) return;
    scene.classList.remove('fire');
    setTimeout(function(){
      scene.classList.add('fire');
      setTimeout(function(){
        runCycle();
      }, 4000);
    }, 4000);
  }
})();
</script>
